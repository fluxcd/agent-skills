name: update-schemas

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1-5"

permissions:
  contents: read

jobs:
  update-schemas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup flux
        uses: fluxcd/flux2/action@main
      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@main
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@main
      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@main
      - name: Download schemas
        run: make download-schemas
      - name: Run validation tests
        run: make test-validate
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          branch: update-schemas
          committer: GitHub <noreply@github.com>
          author: fluxcdbot <fluxcdbot@users.noreply.github.com>
          signoff: true
          commit-message: Update Flux OpenAPI schemas
          title: Update Flux OpenAPI schemas
          body: |
            Update the Flux OpenAPI schemas used for kubeconform validation.
          labels: |
            dependencies
