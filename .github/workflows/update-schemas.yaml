name: update-schemas

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1-5"

permissions:
  contents: read

jobs:
  update-schemas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup flux
        uses: fluxcd/flux2/action@main
        with:
          plugins: |
            schema
      - name: Sync field indexes
        run: make sync-schemas
      - name: Sync validation script
        run: make sync-validate
      - name: Run validation tests
        run: make test-validate
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          branch: update-schemas
          committer: GitHub <noreply@github.com>
          author: fluxcdbot <fluxcdbot@users.noreply.github.com>
          signoff: true
          commit-message: Update Flux CRD field indexes and validation script
          title: Update Flux CRD field indexes and validation script
          body: |
            Update the Flux CRD field indexes used as agent field reference and
            vendor the latest validate.sh from the flux-schema catalog.
          labels: |
            dependencies
