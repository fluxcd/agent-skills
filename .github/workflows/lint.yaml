name: lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup flux
        uses: fluxcd/flux2/action@main
        with:
          plugins: |
            schema
      - name: Check skills
        run: gh skill publish --dry-run
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Check scripts
        run: shellcheck skills/gitops-repo-audit/scripts/*.sh
