name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Package skills
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for skill in skills/*/; do
            name=$(basename "$skill")
            tar -czf "dist/${name}-${TAG}.tar.gz" -C skills "$name"
            (cd skills && zip -qr "../dist/${name}-${TAG}.zip" "$name")
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist
      - name: Attest skill archives
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*
