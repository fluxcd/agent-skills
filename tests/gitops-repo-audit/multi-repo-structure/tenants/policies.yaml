apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: policies
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: "5m"
spec:
  inputs:
    - policyName: "source.policy.fluxcd.io"
  resources:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: flux-allowlist
        namespace: << inputs.provider.namespace >>
        labels:
          fluxcd.controlplane.io/role: "policy"
      data:
        sources: >-
          https://github.com/example/
          oci://ghcr.io/example/
          oci://ghcr.io/controlplaneio-fluxcd/
          oci://ghcr.io/stefanprodan/charts/
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingAdmissionPolicy
      metadata:
        name: << inputs.policyName >>
      spec:
        failurePolicy: Fail
        matchConstraints:
          resourceRules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              apiVersions: ["*"]
              operations: ["CREATE", "UPDATE"]
              resources: ["gitrepositories", "ocirepositories", "helmrepositories"]
        matchConditions:
          - name: "exclude-source-controller-finalizer"
            expression: >
              request.userInfo.username != "system:serviceaccount:flux-system:source-controller"
        paramKind:
          apiVersion: v1
          kind: ConfigMap
        variables:
          - name: url
            expression: object.spec.url
          - name: sources
            expression: params.data.sources.split(' ')
        validations:
          - expression: >
              variables.sources.exists_one(prefix, variables.url.startsWith(prefix))
            messageExpression: >
              "Source " + variables.url + " is not allowed, must be one of " + variables.sources.join(", ")
            reason: Invalid
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingAdmissionPolicyBinding
      metadata:
        name: flux-tenant-sources
      spec:
        policyName: << inputs.policyName >>
        validationActions: ["Deny"]
        paramRef:
          name: flux-allowlist
          namespace: << inputs.provider.namespace >>
          parameterNotFoundAction: "Deny"
        matchResources:
          namespaceSelector:
            matchExpressions:
              - key: toolkit.fluxcd.io/role
                operator: In
                values:
                  - tenant
