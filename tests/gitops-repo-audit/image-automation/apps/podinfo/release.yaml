apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
spec:
  releaseName: podinfo
  targetNamespace: podinfo
  interval: 1h
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: podinfo
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: podinfo-values
      valuesKey: values.yaml
  values:
    replicaCount: 2
