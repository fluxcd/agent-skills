apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  namespace: cache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
      containers:
        - name: cache
          image: ghcr.io/example/cache:1.3.0
          ports:
            - containerPort: 8080
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 256Mi}
