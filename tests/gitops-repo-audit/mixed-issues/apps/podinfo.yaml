apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: podinfo
spec:
  interval: 30m
  chart:
    spec:
      chart: podinfo
      version: ">=6.0.0"
      sourceRef:
        kind: HelmRepository
        name: podinfo
        namespace: flux-system
      interval: 10m
  values:
    replicaCount: 2
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: podinfo.${CLUSTER_DOMAIN}
          paths:
            - path: /
              pathType: Prefix
